# Server Port Configuration
server.port=8080

# Database Connection (Microsoft SQL Server)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=weekly_article_db;encrypt=true;trustServerCertificate=true;
spring.datasource.username=weekly_article_user
spring.datasource.password=SecurePass123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Custom Application Configs for Admin Access
admin.username=admin
admin.password=AdminPassword123!
# Hardcoded token string for basic validation simplicity or custom JWT generation
admin.token-secret=MySuperSecretSigningKeyForSeeYouWeeklyArticleWebsite2026!
